{{- $src := .Get "src" -}}
{{- $poster := .Get "poster" -}}
<div class="video-wrapper">
  <video controls width="100%" preload="none"{{ with $poster }} poster="{{ . | absURL }}"{{ end }}>
    <source src="{{ $src | absURL }}" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>
